name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.2.0)'
        required: true

permissions:
  contents: write

jobs:
  build-desktop:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build and Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.event.inputs.version || github.ref_name }}
          releaseName: '${{ github.event.inputs.version || github.ref_name }}'
          releaseBody: |
            Agent Toast 업데이트입니다.

            ## 설치 방법
            - `Agent.Toast_*_x64-setup.exe` — 설치 프로그램 (Windows)
            - `agent-toast.exe` — 포터블 (설치 없이 실행)
            - `agent-toast-send-linux-x86_64` / `agent-toast-send-linux-aarch64` — 원격 서버용 CLI (Linux)
            - `agent-toast-send-windows-x86_64.exe` — 원격 서버용 CLI (Windows)
            - 기존 버전에서 자동 업데이트
          includeRelease: true
          args: --config crates/agent-toast-desktop/tauri.release.conf.json

      - name: Upload portable exe
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          files: target/release/agent-toast.exe

  build-send:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: agent-toast-send-linux-x86_64
            use_cross: false
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            artifact: agent-toast-send-linux-aarch64
            use_cross: true
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: agent-toast-send-windows-x86_64.exe
            use_cross: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install musl tools (native)
        if: ${{ runner.os == 'Linux' && !matrix.use_cross }}
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install cross
        if: ${{ matrix.use_cross }}
        run: cargo install cross --locked

      - name: Build (native)
        if: ${{ !matrix.use_cross }}
        run: cargo build -p agent-toast-send --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: ${{ matrix.use_cross }}
        run: cross build -p agent-toast-send --release --target ${{ matrix.target }}

      - name: Strip (Linux)
        if: ${{ runner.os == 'Linux' }}
        run: strip target/${{ matrix.target }}/release/agent-toast-send || true

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p dist
          if [ "$RUNNER_OS" = "Windows" ]; then
            cp "target/${{ matrix.target }}/release/agent-toast-send.exe" "dist/${{ matrix.artifact }}"
          else
            cp "target/${{ matrix.target }}/release/agent-toast-send" "dist/${{ matrix.artifact }}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    needs: [build-desktop, build-send]
    runs-on: ubuntu-latest
    steps:
      - name: Download send artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: agent-toast-send-*
          merge-multiple: true
          path: dist/

      - name: Generate checksums
        run: |
          cd dist
          sha256sum agent-toast-send-* > SHA256SUMS
          cat SHA256SUMS

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          files: |
            dist/agent-toast-send-linux-x86_64
            dist/agent-toast-send-linux-aarch64
            dist/agent-toast-send-windows-x86_64.exe
            dist/SHA256SUMS
