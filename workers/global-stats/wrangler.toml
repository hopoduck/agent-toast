name = "agent-toast-stats"
main = "src/index.ts"
compatibility_date = "2026-06-01"
workers_dev = false
routes = [
  { pattern = "agent-toast-stats.hopoduck.com", custom_domain = true }
]

[[d1_databases]]
binding = "DB"
database_name = "agent-toast-stats"
database_id = "98dc306a-d86b-453b-82ff-ae88a18262dd"

# Workers Rate Limiting API (per-colo, best effort). Requires wrangler >= 4.36.
[[ratelimits]]
name = "SYNC_LIMITER"
namespace_id = "1001"
simple = { limit = 10, period = 60 }
